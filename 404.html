<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <script>
    // GitHub Pages SPA fix: store path and redirect to index
    var path = window.location.pathname + window.location.search;
    sessionStorage.setItem('spa_redirect', path);
    window.location.replace(window.location.origin + window.location.pathname.split('/').slice(0, 2).join('/'));
  </script>
</head>
<body></body>
</html>
