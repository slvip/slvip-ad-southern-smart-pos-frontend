<!DOCTYPE html>
<html lang="si">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0f172a" />
  <meta name="description" content="AD SOUTHERN SMART POS - ස්මාර්ට් කඩ කළමනාකරණ පද්ධතිය" />

  <!-- Security headers via meta -->
  <meta http-equiv="X-Content-Type-Options" content="nosniff" />
  <meta http-equiv="X-Frame-Options" content="DENY" />
  <meta http-equiv="Referrer-Policy" content="strict-origin-when-cross-origin" />

  <!-- GitHub Pages SPA redirect fix -->
  <script>
    // Redirect /#/path → HashRouter handles it natively
    // This handles direct URL access via GitHub Pages 404.html redirect
    (function() {
      var redirect = sessionStorage.getItem('spa_redirect');
      if (redirect) {
        sessionStorage.removeItem('spa_redirect');
        window.history.replaceState(null, null, redirect);
      }
    })();
  </script>

  <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
  <title>AD SOUTHERN SMART POS</title>

  <!-- Google Fonts: Noto Sans Sinhala + Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Sinhala:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <!-- QuaggaJS: Camera Barcode Scanner (Module 3B) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"></script>
</head>
<body>

  <div id="root"></div>
</body>
</html>
